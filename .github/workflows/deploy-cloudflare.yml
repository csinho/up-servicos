name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-cloudflare-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build && npm run build:verify
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: Sync Worker secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          WOOVI_APP_ID: ${{ secrets.WOOVI_APP_ID }}
          BILLING_CRON_SECRET: ${{ secrets.BILLING_CRON_SECRET }}
          ADMIN_WHATSAPP_ALLOWLIST: ${{ secrets.ADMIN_WHATSAPP_ALLOWLIST }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: |
          set -euo pipefail
          put_secret() {
            printf '%s' "$2" | npx wrangler secret put "$1"
          }
          put_secret SUPABASE_SERVICE_ROLE_KEY "$SUPABASE_SERVICE_ROLE_KEY"
          put_secret WOOVI_APP_ID "$WOOVI_APP_ID"
          put_secret BILLING_CRON_SECRET "$BILLING_CRON_SECRET"
          if [ -n "${ADMIN_WHATSAPP_ALLOWLIST:-}" ]; then
            put_secret ADMIN_WHATSAPP_ALLOWLIST "$ADMIN_WHATSAPP_ALLOWLIST"
          fi
          put_secret VITE_SUPABASE_URL "$VITE_SUPABASE_URL"
          put_secret VITE_SUPABASE_PUBLISHABLE_KEY "$VITE_SUPABASE_PUBLISHABLE_KEY"
